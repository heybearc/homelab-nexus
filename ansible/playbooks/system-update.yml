---
- name: System Update - Update packages on all hosts
  hosts: all
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      
    - name: Upgrade all packages (Debian/Ubuntu)
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      when: ansible_os_family == "Debian"
      register: apt_upgrade
      
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_os_family == "Debian"
      
    - name: Display upgrade results
      debug:
        msg: "{{ apt_upgrade.stdout_lines | default([\"No updates available\"]) }}"
      when: apt_upgrade is defined
      
    - name: Notify if reboot required
      debug:
        msg: "REBOOT REQUIRED on {{ inventory_hostname }}"
      when: reboot_required.stat.exists | default(false)
