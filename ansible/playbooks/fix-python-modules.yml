---
- name: Fix Python Modules - Install python3-six on affected hosts
  hosts: theoshift-green,quantshift-blue,quantshift-green,postgresql-primary,postgresql-replica,monitoring-stack
  become: yes
  gather_facts: no
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
        
    - name: Install python3-six package
      apt:
        name: python3-six
        state: present
        
    - name: Verify installation
      shell: python3 -c "import six; print(six.__version__)"
      register: six_version
      changed_when: false
      
    - name: Display result
      debug:
        msg: "Python six version {{ six_version.stdout }} installed on {{ inventory_hostname }}"
